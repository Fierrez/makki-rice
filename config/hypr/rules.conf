# =============================================================================
# rules.conf — Window & Layer Rules
# =============================================================================

# ─── Float Rules ─────────────────────────────────────────────────────────────
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Save File)$
windowrule = float 1, match:title ^(Confirm)$
windowrule = float 1, match:class ^(org.gnome.Calculator)$
windowrule = float 1, match:class ^(xdg-desktop-portal-gtk)$

# ─── Size Rules ──────────────────────────────────────────────────────────────
windowrule = size 900 600, match:class ^(pavucontrol)$
windowrule = size 800 500, match:class ^(nm-connection-editor)$
windowrule = size 700 500, match:class ^(blueman-manager)$

# ─── Center Rules ────────────────────────────────────────────────────────────
windowrule = center 1, match:class ^(pavucontrol)$
windowrule = center 1, match:class ^(nm-connection-editor)$
windowrule = center 1, match:class ^(org.gnome.Calculator)$
windowrule = center 1, match:class ^(xdg-desktop-portal-gtk)$

# ─── Opacity ─────────────────────────────────────────────────────────────────
windowrule = opacity 0.92, match:class ^(thunar)$
windowrule = opacity 0.95, match:class ^(code-url-handler)$   # VSCode
windowrule = opacity 0.95, match:class ^(jetbrains-.*)$

# ─── Blur (AGS / Layer) ──────────────────────────────────────────────────────
layerrule = blur on, match:namespace ^(gtk-layer-shell)$
layerrule = blur on, match:namespace ^(waybar)$
layerrule = ignore_zero on, match:namespace ^(gtk-layer-shell)$
layerrule = ignore_alpha 0.5, match:namespace ^(waybar)$

# ─── Workspace Assignments ───────────────────────────────────────────────────
windowrule = workspace 1, match:class ^(firefox)$
windowrule = workspace 2, match:class ^(code-url-handler)$
windowrule = workspace 3, match:class ^(discord)$
windowrule = workspace 3, match:class ^(telegram-desktop)$
windowrule = workspace 4, match:class ^(spotify)$

# ─── Suppress Events ─────────────────────────────────────────────────────────
windowrule = suppressevent maximize, match:class ^.*$ # Suppress maximization requests
