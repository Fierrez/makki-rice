# =============================================================================
# rules.conf — Window & Layer Rules
# =============================================================================

# ─── Float Rules ─────────────────────────────────────────────────────────────
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = float, class:(blueman-manager)
windowrulev2 = float, class:(thunar), title:(File Operation Progress)
windowrulev2 = float, title:(Open File)
windowrulev2 = float, title:(Save File)
windowrulev2 = float, title:(Confirm)
windowrulev2 = float, class:(org.gnome.Calculator)
windowrulev2 = float, class:(xdg-desktop-portal-gtk)

# ─── Size Rules ──────────────────────────────────────────────────────────────
windowrulev2 = size 900 600, class:(pavucontrol)
windowrulev2 = size 800 500, class:(nm-connection-editor)
windowrulev2 = size 700 500, class:(blueman-manager)

# ─── Center Rules ────────────────────────────────────────────────────────────
windowrulev2 = center, class:(pavucontrol)
windowrulev2 = center, class:(nm-connection-editor)
windowrulev2 = center, class:(org.gnome.Calculator)
windowrulev2 = center, class:(xdg-desktop-portal-gtk)

# ─── Opacity ─────────────────────────────────────────────────────────────────
windowrulev2 = opacity 0.92, class:(thunar)
windowrulev2 = opacity 0.95, class:(code-url-handler)   # VSCode
windowrulev2 = opacity 0.95, class:(jetbrains-.*)

# ─── Blur (AGS / Layer) ──────────────────────────────────────────────────────
layerrule = blur, gtk-layer-shell
layerrule = blur, waybar
layerrule = ignorezero, gtk-layer-shell
layerrule = ignorealpha 0.5, waybar

# ─── Workspace Assignments ───────────────────────────────────────────────────
windowrulev2 = workspace 1, class:(firefox)
windowrulev2 = workspace 2, class:(code-url-handler)
windowrulev2 = workspace 3, class:(discord)
windowrulev2 = workspace 3, class:(telegram-desktop)
windowrulev2 = workspace 4, class:(spotify)

# ─── Idle Inhibit ────────────────────────────────────────────────────────────
windowrulev2 = idleinhibit fullscreen, class:(.*)
windowrulev2 = idleinhibit focus, class:(mpv)
windowrulev2 = idleinhibit focus, class:(vlc)

# ─── Suppress Events ─────────────────────────────────────────────────────────
windowrulev2 = suppressevent maximize, class:.* # Suppress maximization requests
