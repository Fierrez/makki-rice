# =============================================================================
# monitors.conf — Monitor Setup
# =============================================================================
# Format: monitor=name,resolution@refresh,position,scale
# Run `hyprctl monitors` to get your monitor names.
# =============================================================================

# ─── Primary Monitor ─────────────────────────────────────────────────────────
# Auto-detect: fallback for any monitor
monitor = ,preferred,auto,1

# ─── Common Setups (uncomment and customize) ─────────────────────────────────

# Single 1080p 144Hz
# monitor = DP-1,1920x1080@144,0x0,1

# Single 1440p 165Hz
# monitor = DP-1,2560x1440@165,0x0,1

# Single 4K 60Hz
# monitor = DP-1,3840x2160@60,0x0,1.5

# Dual monitor (primary + secondary right)
# monitor = DP-1,2560x1440@165,0x0,1
# monitor = HDMI-A-1,1920x1080@60,2560x0,1

# Laptop + external
# monitor = eDP-1,1920x1080@60,0x0,1
# monitor = DP-1,2560x1440@144,1920x0,1

# ─── Workspace Assignments ───────────────────────────────────────────────────
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 9, monitor:HDMI-A-1
# workspace = 10, monitor:HDMI-A-1, default:true
