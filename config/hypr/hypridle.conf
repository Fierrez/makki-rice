# hypridle.conf — Idle daemon configuration
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    lock_cmd      = pidof hyprlock || hyprlock   # Don't double-lock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim screen after 2.5 min
listener {
    timeout  = 150
    on-timeout = brightnessctl -s set 10%   # Save + dim to 10%
    on-resume  = brightnessctl -r            # Restore saved brightness
}

# Lock screen after 5 min
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
}

# Turn off display after 7 min
listener {
    timeout  = 420
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Suspend after 30 min
listener {
    timeout  = 1800
    on-timeout = systemctl suspend
}
