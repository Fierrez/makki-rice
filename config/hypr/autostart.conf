# =============================================================================
# autostart.conf — Programs launched on Hyprland startup
# =============================================================================

# ─── DBus / Environment ───────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ─── Auth Agent ───────────────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ─── Wallpaper ────────────────────────────────────────────────────────────────
exec-once = awww-daemon
exec-once = sleep 1.5 && awww img ~/.config/makki-rice/assets/wallpapers/default.jpg --transition-type grow --transition-pos 0.5,0.5 --transition-duration 1.5

# ─── UI Engine (AGS — aylurs-gtk-shell) ──────────────────────────────────────
# Install: yay -S aylurs-gtk-shell  (see aylur.github.io/ags-docs)
exec-once = command -v ags &>/dev/null && ags || command -v agsv1 &>/dev/null && agsv1

# ─── Notifications ────────────────────────────────────────────────────────────
exec-once = swaync

# ─── Idle / Lock ──────────────────────────────────────────────────────────────
exec-once = hypridle

# ─── Clipboard ────────────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─── System Tray ──────────────────────────────────────────────────────────────
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ─── Event Router ─────────────────────────────────────────────────────────────
exec-once = bash ~/.config/makki-rice/services/hyprland/event-router.sh

# ─── XDG Portal ───────────────────────────────────────────────────────────────
exec-once = sleep 1 && xdg-desktop-portal-hyprland
exec-once = sleep 2 && xdg-desktop-portal --replace

# ─── Startup Theme Apply ──────────────────────────────────────────────────────
# Applies whichever theme was last selected (reads from cache)
exec-once = sleep 1 && bash ~/.config/makki-rice/scripts/system/theme-switch.sh $(cat ~/.cache/makki-rice/current-theme 2>/dev/null || echo mocha)

# ─── Config Check ─────────────────────────────────────────────────────────────
# Capture and log any syntax/configuration errors on startup
exec-once = sleep 3 && bash ~/.config/makki-rice/scripts/hypr/config-check.sh

