# =============================================================================
# autostart.conf — Programs launched on Hyprland startup
# =============================================================================

# ─── Essential Services ───────────────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ─── Wallpaper ────────────────────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/../../assets/wallpapers/default.jpg --transition-type grow --transition-pos 0.5,0.5 --transition-duration 1.5

# ─── UI Engine (AGS) ──────────────────────────────────────────────────────────
exec-once = ags

# ─── Notifications ────────────────────────────────────────────────────────────
exec-once = swaync

# ─── Idle / Lock ─────────────────────────────────────────────────────────────
exec-once = hypridle

# ─── Clipboard ───────────────────────────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─── Input Method ────────────────────────────────────────────────────────────
# exec-once = fcitx5 -d

# ─── System Tray ─────────────────────────────────────────────────────────────
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ─── Event Router ────────────────────────────────────────────────────────────
exec-once = bash ~/.config/makki-rice/services/hyprland/event-router.sh

# ─── XDG Portal ──────────────────────────────────────────────────────────────
exec-once = xdg-desktop-portal-hyprland
exec-once = sleep 1 && xdg-desktop-portal
