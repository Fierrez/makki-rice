# =============================================================================
# bindings.conf — Keybindings
# =============================================================================
# SUPER = Windows/Meta key
# Script paths assume config is symlinked from ~/.config/makki-rice
# =============================================================================

$mod = SUPER
$terminal = kitty
$browser = firefox
$fileManager = thunar
$launcher = bash ~/.config/makki-rice/scripts/ui/launcher.sh toggle
$colorPicker = hyprpicker -a
$scriptUi = ~/.config/makki-rice/scripts/ui
$scriptSys = ~/.config/makki-rice/scripts/system

# ─── System ──────────────────────────────────────────────────────────────────
bind = $mod, Q,             killactive
bind = $mod SHIFT, Q,       exec, ags -r "globalThis.togglePowerMenu?.()"   # power menu
bind = $mod CTRL SHIFT, Q,  exit                                               # force exit
bind = $mod, F,             fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1
bind = $mod, Space,         togglefloating
bind = $mod, P,             pseudo       # Dwindle
bind = $mod, T,             layoutmsg, togglesplit  # Dwindle
bind = $mod CTRL ALT, L,    exec, loginctl lock-session
bind = $mod SHIFT, R,       exec, bash $scriptSys/../hypr/reload.sh --css
bind = $mod ALT, R,         exec, bash $scriptSys/../hypr/reload.sh --ags

# ─── Apps ────────────────────────────────────────────────────────────────────
bind = $mod, Return,    exec, $terminal
bind = $mod, B,         exec, $browser
bind = $mod, E,         exec, $fileManager
bind = $mod, R,         exec, $launcher
bind = $mod SHIFT, C,   exec, $colorPicker
bind = $mod, N,         exec, swaync-client -t   # toggle notification center
bind = $mod SHIFT, N,   exec, swaync-client -d   # toggle DND

# ─── Theme ────────────────────────────────────────────────────────────────────
bind = $mod ALT, 1,  exec, bash $scriptSys/theme-switch.sh mocha
bind = $mod ALT, 2,  exec, bash $scriptSys/theme-switch.sh latte
bind = $mod ALT, 3,  exec, bash $scriptSys/theme-switch.sh frappe
bind = $mod ALT, 4,  exec, bash $scriptSys/theme-switch.sh macchiato

# ─── Clipboard ───────────────────────────────────────────────────────────────
bind = $mod, V,         exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ─── Screenshots ─────────────────────────────────────────────────────────────
bind =      , Print,    exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print,    exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mod , Print,    exec, grim - | wl-copy  # full screen to clipboard


# ─── Focus Movement ──────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ─── Window Movement ─────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# ─── Resize ──────────────────────────────────────────────────────────────────
binde = $mod CTRL, H,     resizeactive, -20 0
binde = $mod CTRL, L,     resizeactive,  20 0
binde = $mod CTRL, K,     resizeactive,  0 -20
binde = $mod CTRL, J,     resizeactive,  0  20

# ─── Workspaces ──────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ─── Special Workspace (Scratchpad) ──────────────────────────────────────────
bind = $mod, S,       togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# ─── Mouse Binds ─────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ─── Media / System Keys ─────────────────────────────────────────────────────
bindel =, XF86AudioRaiseVolume,   exec, bash $scriptSys/audio.sh up
bindel =, XF86AudioLowerVolume,   exec, bash $scriptSys/audio.sh down
bindl  =, XF86AudioMute,          exec, bash $scriptSys/audio.sh mute
bindel =, XF86MonBrightnessUp,    exec, bash $scriptSys/brightness.sh up
bindel =, XF86MonBrightnessDown,  exec, bash $scriptSys/brightness.sh down
bindl  =, XF86AudioPlay,          exec, playerctl play-pause && bash $scriptUi/island.sh media
bindl  =, XF86AudioNext,          exec, playerctl next && bash $scriptUi/island.sh media
bindl  =, XF86AudioPrev,          exec, playerctl previous && bash $scriptUi/island.sh media
