# =============================================================================
# hyprland.conf — Main compositor config
# =============================================================================
# All sub-configs are sourced from this file.
# Edit sub-files for specific categories.
# =============================================================================

# ─── Source Sub-Configs ──────────────────────────────────────────────────────
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/rules.conf

# ─── General ─────────────────────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(89b4faff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    allow_tearing = false
    resize_on_border = true
}

# ─── Decoration ──────────────────────────────────────────────────────────────
decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a2ecc)
        color_inactive = rgba(1a1a2e66)
    }
}

# ─── Animations ──────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = smoothOut,  0.36, 0, 0.66, -0.56
    bezier = smoothIn,   0.25, 1, 0.5, 1
    bezier = overshot,   0.05, 0.9, 0.1, 1.05
    bezier = linear,     0, 0, 1, 1
    bezier = spring,     0.155, 1.105, 0.22, 1.0

    animation = windows,     1, 5,  spring,    popin 80%
    animation = windowsOut,  1, 4,  smoothOut, popin 80%
    animation = windowsMove, 1, 5,  spring
    animation = border,      1, 10, linear
    animation = borderangle, 1, 30, linear,   loop
    animation = fade,        1, 5,  smoothIn
    animation = workspaces,  1, 6,  spring,    slidevert
    animation = layers,      1, 4,  spring,    slide
}

# ─── Input ───────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = true
        disable_while_typing = true
    }
}

# ─── Gestures ────────────────────────────────────────────────────────────────
# Reworked gesture syntax for modern Hyprland
gesture = 3, horizontal, workspace


# ─── Layouts ─────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = slave
    mfact = 0.55
}

# ─── Misc ────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    focus_on_activate = false
    on_focus_under_fullscreen = 2
}

# ─── XWayland ────────────────────────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
