# ─── Password Input ───────────────────────────────────────────────────────────
input-field {
    monitor        =
    size           = 300, 52
    outline_thickness = 2
    dots_size      = 0.30
    dots_spacing   = 0.18
    dots_center    = true
    dots_rounding  = -1
    outer_color    = rgba(137, 180, 250, 0.6)   # $blue
    inner_color    = rgba(24, 24, 37, 0.85)     # $base
    font_color     = rgba(205, 214, 244, 1.0)   # $text
    fade_on_empty  = false
    placeholder_text = <i>Password...</i>
    hide_input     = false
    rounding       = 12
    check_color    = rgba(166, 227, 161, 1.0)   # $green
    fail_color     = rgba(243, 139, 168, 1.0)   # $red
    fail_text      = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout   = 2000
    fail_transition = 300
    capslock_color = rgba(249, 226, 175, 1.0)   # $yellow
    numlock_color  = rgba(137, 180, 250, 0.5)
    bothlock_color = rgba(249, 226, 175, 0.8)
    invert_numlock = false
    position       = 0, -240
    halign         = center
    valign         = center
}

# ─── Status hint ─────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:30000] bash -c "pamixer --get-volume-human && echo -n ' · ' && nmcli -t -f active,ssid dev wifi 2>/dev/null | grep '^yes' | cut -d: -f2 || echo Offline"
    color      = rgba(127, 132, 156, 0.8)
    font_size  = 13
    font_family = JetBrains Mono Nerd Font
    position   = 0, -310
    halign     = center
    valign     = center
}
