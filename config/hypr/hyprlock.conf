# hyprlock.conf — Lock screen configuration
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    disable_loading_bar = false
    grace               = 2       # 2s grace before locking mouse
    hide_cursor         = true
    no_fade_in          = false
}

# ─── Background ───────────────────────────────────────────────────────────────
background {
    monitor     =
    path        = screenshot   # blur the current screen
    blur_passes = 3
    blur_size   = 8
    noise       = 0.0117
    contrast    = 0.8916
    brightness  = 0.8172
    vibrancy    = 0.1696
    vibrancy_darkness = 0.0
}

# ─── Clock ────────────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:1000] echo "$(date '+%H:%M')"
    color      = rgba(205, 214, 244, 1.0)  # $text
    font_size  = 90
    font_family = JetBrains Mono Nerd Font Bold
    position   = 0, 80
    halign     = center
    valign     = center
}

label {
    monitor    =
    text       = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color      = rgba(166, 173, 200, 1.0)  # $subtext0
    font_size  = 20
    font_family = JetBrains Mono Nerd Font
    position   = 0, -20
    halign     = center
    valign     = center
}

