# =============================================================================
# kitty.conf — Terminal Emulator Configuration
# Catppuccin Mocha theme + JetBrains Mono Nerd Font
# =============================================================================

# ─── Font ─────────────────────────────────────────────────────────────────────
font_family      JetBrains Mono Nerd Font
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size        13.0
disable_ligatures never

# ─── Window ───────────────────────────────────────────────────────────────────
window_padding_width    14
window_margin_width     0
hide_window_decorations yes
background_opacity      0.92
dynamic_background_color yes
placement_strategy      center

# Tabs
tab_bar_style           powerline
tab_powerline_style     round
tab_bar_edge            top
tab_bar_margin_width    4.0
tab_bar_margin_height   4.0 0.0
active_tab_font_style   bold
inactive_tab_font_style normal

# ─── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0.5
cursor_stop_blinking_after 15.0

# ─── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines       10000
scrollback_pager       less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ─── URLs ─────────────────────────────────────────────────────────────────────
url_style              curly
open_url_with          default
detect_urls            yes
copy_on_select         clipboard

# ─── Performance ──────────────────────────────────────────────────────────────
repaint_delay          10
input_delay            3
sync_to_monitor        yes

# ─── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell      no
visual_bell_duration   0.0
window_alert_on_bell   yes

# ─── Catppuccin Mocha Palette ─────────────────────────────────────────────────
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

cursor                  #F5E0DC
cursor_text_color       #1E1E2E

url_color               #F5E0DC

active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Wayland titlebar
wayland_titlebar_color  system

# Tab bar
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Color table
color0   #45475A   # Black (surface1)
color1   #F38BA8   # Red
color2   #A6E3A1   # Green
color3   #F9E2AF   # Yellow
color4   #89B4FA   # Blue
color5   #F5C2E7   # Magenta (pink)
color6   #94E2D5   # Cyan (teal)
color7   #BAC2DE   # White (subtext1)
color8   #585B70   # Bright Black (surface2)
color9   #F38BA8   # Bright Red
color10  #A6E3A1   # Bright Green
color11  #F9E2AF   # Bright Yellow
color12  #89B4FA   # Bright Blue
color13  #F5C2E7   # Bright Magenta
color14  #94E2D5   # Bright Cyan
color15  #A6ADC8   # Bright White (subtext0)

# ─── Keybindings ──────────────────────────────────────────────────────────────
# Clear defaults and set only what we need
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard
map ctrl+shift+t         new_tab
map ctrl+shift+w         close_tab
map ctrl+tab             next_tab
map ctrl+shift+tab       previous_tab
map ctrl+shift+equal     change_font_size all +1.0
map ctrl+shift+minus     change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
map ctrl+shift+f         show_scrollback
map ctrl+shift+u         kitten unicode_input
